name: 🚀 Build & Release APK

on:
  push:
    tags:
      - 'v*.*.*'       # Trigger on version tags: v1.0.0, v1.2.3, etc.
  workflow_dispatch:   # Allow manual trigger from GitHub Actions UI

env:
  DISCORD_WEBHOOK: https://discord.com/api/webhooks/1392378414526103593/0cCpbWiPo62o26qLAHZZGJsf0Sjlw0bJATqEJ55xurVcW5fDfS18QtKmU-GXIFkBPfCB
  APK_NAME: telegram-drive-${{ github.ref_name }}.apk

jobs:
  build:
    name: 🔨 Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required for softprops/action-gh-release to create releases

    steps:
      # ── 1. Notify Discord: Build Started ─────────────────────────────────
      - name: 📣 Discord — Build Started
        run: |
          VERSION="${{ github.ref_name }}"
          [ -z "$VERSION" ] && VERSION="manual"
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🔨 Build Started\",
                \"description\": \"A new APK build has been triggered for **Telegram Drive Mobile**.\",
                \"color\": 3447003,
                \"fields\": [
                  { \"name\": \"🏷️ Version\", \"value\": \"${VERSION}\", \"inline\": true },
                  { \"name\": \"👤 Author\", \"value\": \"${{ github.actor }}\", \"inline\": true },
                  { \"name\": \"🔗 Run\", \"value\": \"[View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": false }
                ],
                \"footer\": { \"text\": \"Telegram Drive Mobile CI/CD · 0xJhinkz\" }
              }]
            }"

      # ── 2. Checkout code ──────────────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ── 3. Setup Java 17 (required for Android Gradle builds) ────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Setup Android SDK ──────────────────────────────────────────────
      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 4b. Install required SDK components ──────────────────────────────
      - name: 📲 Install SDK 35 + Build Tools
        run: |
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0" --sdk_root=$ANDROID_SDK_ROOT

      # ── 5. Setup Node.js ──────────────────────────────────────────────────
      - name: 🟢 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── 6. Install JS dependencies ────────────────────────────────────────
      - name: 📦 Install Dependencies
        working-directory: mobile-app
        run: npm install --legacy-peer-deps

      # ── 6b. Align Expo package versions ──────────────────────────────────
      - name: 🔧 Fix Expo SDK version alignment
        working-directory: mobile-app
        run: npx expo install --fix -- --legacy-peer-deps

      # ── 7. Expo Prebuild — generates native Android project ───────────────
      - name: ⚙️ Expo Prebuild (generate Android native code)
        working-directory: mobile-app
        run: |
          npx expo prebuild --platform android --no-install --clean
        env:
          EXPO_NO_DOTENV: 1

      # ── 8. Make Gradlew executable ────────────────────────────────────────
      - name: 🔧 Make Gradlew Executable
        working-directory: mobile-app/android
        run: chmod +x gradlew

      # ── 8b. Patch Kotlin/Compose version compatibility ──────────────────
      - name: 🔨 Fix Kotlin/Compose version mismatch
        working-directory: mobile-app/android
        run: |
          # react-native@0.76.9 forces KGP 1.9.25 via its version catalog
          # (gradle/libs.versions.toml) but expo-modules-core uses Compose
          # Compiler 1.5.14 which requires exact 1.9.24.
          # Since 1.9.25 is binary compatible, suppress the strict version check.
          cat >> build.gradle << 'PATCH'

          gradle.projectsEvaluated {
              subprojects {
                  tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                      compilerOptions {
                          freeCompilerArgs.addAll([
                              "-P",
                              "plugin:androidx.compose.compiler.plugins.kotlin:suppressKotlinVersionCompatibilityCheck=1.9.25"
                          ])
                      }
                  }
              }
          }
          PATCH

      # ── 9. Cache Gradle to speed up future builds ─────────────────────────
      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('mobile-app/android/**/*.gradle*', 'mobile-app/android/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 10. Build Release APK ─────────────────────────────────────────────
      - name: 🏗️ Build Release APK
        working-directory: mobile-app/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── 11. Rename & stage APK ────────────────────────────────────────────
      - name: 📋 Rename APK
        run: |
          VERSION="${{ github.ref_name }}"
          [ -z "$VERSION" ] && VERSION="dev"
          APK_SRC=$(find mobile-app/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK_SRC" "telegram-drive-${VERSION}.apk"
          echo "APK_PATH=telegram-drive-${VERSION}.apk" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      # ── 12. Upload APK artifact (always available for download) ──────────
      - name: 📎 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegram-drive-apk
          path: ${{ env.APK_PATH }}
          retention-days: 30

      # ── 13. Create GitHub Release + attach APK (tags only) ────────────────
      - name: 🚢 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
          name: Telegram Drive Mobile ${{ env.VERSION }}
          body: |
            ## 📱 Telegram Drive Mobile ${{ env.VERSION }}

            **Built automatically by GitHub Actions · No EAS required.**

            ### 📥 How to Install
            1. Download `telegram-drive-${{ env.VERSION }}.apk` below
            2. On your Android device: *Settings → Security → Allow unknown sources*
            3. Open the APK file and tap **Install**

            ### ✨ What's New
            See the [Discussions](https://github.com/${{ github.repository }}/discussions) tab for the full roadmap.

            ---
            Built & maintained by [0xJhinkz](https://github.com/0xJhinkz) · All rights reserved.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 14. Discord: Success ──────────────────────────────────────────────
      - name: ✅ Discord — Build Successful
        if: success()
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/tag/${{ env.VERSION }}"
            DOWNLOAD_TEXT="[📥 Download APK](${DOWNLOAD_URL})"
          else
            DOWNLOAD_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            DOWNLOAD_TEXT="[📎 Download from Artifacts](${DOWNLOAD_URL})"
          fi
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ Build Successful!\",
                \"description\": \"**Telegram Drive Mobile** \`${{ env.VERSION }}\` APK has been built! 🎉\",
                \"color\": 3066993,
                \"fields\": [
                  { \"name\": \"📥 Download\", \"value\": \"${DOWNLOAD_TEXT}\", \"inline\": false },
                  { \"name\": \"🏷️ Version\", \"value\": \"${{ env.VERSION }}\", \"inline\": true },
                  { \"name\": \"👤 Author\", \"value\": \"${{ github.actor }}\", \"inline\": true }
                ],
                \"footer\": { \"text\": \"Telegram Drive Mobile CI/CD · 0xJhinkz\" }
              }]
            }"

      # ── 15. Discord: Failure ──────────────────────────────────────────────
      - name: ❌ Discord — Build Failed
        if: failure()
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ Build Failed!\",
                \"description\": \"The APK build for **Telegram Drive Mobile** \`${{ env.VERSION }}\` failed. Please check the logs.\",
                \"color\": 15158332,
                \"fields\": [
                  { \"name\": \"🔍 View Logs\", \"value\": \"[GitHub Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": false },
                  { \"name\": \"🏷️ Version\", \"value\": \"${{ env.VERSION }}\", \"inline\": true },
                  { \"name\": \"👤 Triggered By\", \"value\": \"${{ github.actor }}\", \"inline\": true }
                ],
                \"footer\": { \"text\": \"Telegram Drive Mobile CI/CD · 0xJhinkz\" }
              }]
            }"
